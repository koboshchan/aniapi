services:
  api:
    build: .
    ports:
      - "3001:3000"
    environment:
      - PORT=3000
      - NODE_ENV=production
      - MONGODB_URI=mongodb://mongodb:27017/aniapi
    depends_on:
      - mongodb
    restart: always

  mongodb:
    image: mongo:latest
    restart: always
    # No ports exposed as per request
